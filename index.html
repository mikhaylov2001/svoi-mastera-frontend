<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="application-name" content="СвоиМастера" />
  <meta name="apple-mobile-web-app-title" content="СвоиМастера" />
  <meta
    name="description"
    content="СвоиМастера — маркетплейс для поиска мастеров по домашним задачам"
  />

  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <title>СвоиМастера</title>
  <script>
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.unregister(); });
        });
      }
      window.__svoiShowBootError = function (message) {
        var el = document.getElementById('root');
        if (!el) return;
        el.innerHTML = '<div style="padding:24px;font-family:Manrope,system-ui,sans-serif;background:#f6f6f4;min-height:100vh;box-sizing:border-box"><div style="max-width:360px;margin:40px auto;background:#fff;border-radius:16px;padding:24px 20px;text-align:center;box-shadow:0 8px 32px rgba(15,23,42,.08)"><p style="margin:0 0 8px;font-size:18px;font-weight:800;color:#111">Не удалось загрузить приложение</p><p style="margin:0 0 20px;font-size:14px;line-height:1.5;color:#6b7280">' + message + '</p><button type="button" onclick="location.reload()" style="width:100%;min-height:48px;border:none;border-radius:12px;background:#e8410a;color:#fff;font-size:15px;font-weight:800">Обновить</button></div></div>';
      };
      document.addEventListener('DOMContentLoaded', function () {
        var root = document.getElementById('root');
        if (root && !root.childElementCount) {
          root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;font-family:Manrope,system-ui,sans-serif;color:#6b7280;font-weight:600">Загрузка…</div>';
        }
      });
      window.addEventListener('error', function (event) {
        var target = event.target;
        if (target && target.tagName === 'SCRIPT' && target.type === 'module' && !event.error) {
          window.__svoiShowBootError('Не удалось скачать скрипты. Обновите страницу или откройте в Safari.');
        }
      }, true);
    })();
  </script>
</head>
<body>
  <noscript>Для работы приложения необходимо включить JavaScript.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
